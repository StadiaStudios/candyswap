<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shop - CandySwap</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="assets/favicon.jpeg">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
        --neon-pink: #ff00ff;
        --neon-cyan: #00ffff;
        --neon-yellow: #ffff00;
        --neon-green: #39ff14;
        --bg-color: #0a0a0a;
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); border-left: 2px solid #333; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink); border: 2px solid var(--bg-color); }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    * { scrollbar-width: thin; scrollbar-color: var(--neon-pink) var(--bg-color); }

    body {
        margin: 0;
        padding: 20px;
        background: var(--bg-color);
        color: white;
        font-family: 'Press Start 2P', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 80px;
        min-height: 100vh;
        position: relative;
    }

    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 999;
        background-size: 100% 3px, 3px 100%;
        pointer-events: none;
    }

    .header {
        width: 100%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .back-btn {
        background: transparent;
        border: 3px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 10px 12px;
        text-decoration: none;
        font-size: 10px;
        box-shadow: 4px 4px 0 var(--neon-cyan);
        transition: all 0.1s;
        text-transform: uppercase;
    }

    .back-btn:active {
        box-shadow: 0px 0px 0 var(--neon-cyan);
        transform: translate(4px, 4px);
    }

    .gold-display {
        font-size: 12px;
        color: var(--neon-yellow);
        display: flex;
        align-items: center;
        gap: 10px;
        background: #000;
        padding: 10px 15px;
        border: 3px solid var(--neon-yellow);
        box-shadow: 4px 4px 0 var(--neon-yellow);
    }

    .page-title {
        font-size: 24px;
        margin: 20px 0 40px 0;
        color: var(--neon-pink);
        text-shadow: 4px 4px 0 #000, 6px 6px 0 var(--neon-cyan);
        text-align: center;
    }

    .shop-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        width: 100%;
        max-width: 800px;
    }

    @media (min-width: 768px) {
        .shop-grid {
            grid-template-columns: 1fr 1fr;
        }
    }

    .island-card {
        background: #000;
        border: 4px solid var(--neon-pink);
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        transition: 0.1s;
        position: relative;
        box-shadow: 6px 6px 0 var(--neon-cyan);
    }

    .island-card.active {
        border-color: var(--neon-green);
        box-shadow: 6px 6px 0 var(--neon-yellow);
    }

    .island-card.locked {
        opacity: 0.6;
    }

    .lock-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.8);
        z-index: 10;
        text-align: center;
        padding: 10px;
    }

    .lock-text {
        font-size: 10px;
        color: var(--neon-pink);
        line-height: 1.6;
    }

    .island-preview {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border: 3px solid #333;
        image-rendering: pixelated;
    }

    .island-info h2 {
        margin: 0 0 10px 0;
        color: var(--neon-cyan);
        font-size: 14px;
        text-transform: uppercase;
    }

    .island-info p {
        margin: 0;
        font-size: 9px;
        color: #aaa;
        line-height: 1.5;
    }

    .buy-btn {
        background: #000;
        border: 3px solid var(--neon-yellow);
        color: var(--neon-yellow);
        padding: 15px;
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        cursor: pointer;
        width: 100%;
        box-shadow: 4px 4px 0 var(--neon-yellow);
        transition: all 0.1s;
        text-transform: uppercase;
    }

    .buy-btn:hover:not(:disabled) {
        background: var(--neon-yellow);
        color: #000;
    }

    .buy-btn:active:not(:disabled) {
        box-shadow: 0px 0px 0 var(--neon-yellow);
        transform: translate(4px, 4px);
    }

    .buy-btn:disabled {
        border-color: #444;
        color: #444;
        box-shadow: 4px 4px 0 #222;
        cursor: not-allowed;
    }

    .equip-btn {
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
        box-shadow: 4px 4px 0 var(--neon-cyan);
    }

    .equip-btn:hover {
        background: var(--neon-cyan) !important;
        color: #000 !important;
    }

    .owned-badge {
        color: var(--neon-green);
        font-size: 10px;
        text-align: center;
        border: 3px solid var(--neon-green);
        padding: 12px;
        box-shadow: 4px 4px 0 var(--neon-green);
    }

    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }

    .modal-box {
        background: #000;
        border: 4px solid var(--neon-pink);
        padding: 30px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 8px 8px 0 var(--neon-cyan);
    }

    .modal-box p {
        font-size: 12px;
        margin-bottom: 25px;
        line-height: 1.6;
        color: #fff;
    }

    .blink {
        animation: blinker 1s step-end infinite;
    }
    @keyframes blinker {
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">&lt; BACK</a>
    <div class="gold-display">
        <span id="gold-val">0</span> GP
    </div>
</div>

<h1 class="page-title">WORLD SELECT</h1>

<div class="shop-grid" id="shop-grid"></div>

<div id="msg-modal" class="modal-overlay">
    <div class="modal-box">
        <p id="msg-text"></p>
        <button class="buy-btn" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const buySfx = new Audio('assets/sfx/buy.mp3');
    const equipSfx = new Audio('assets/sfx/select.mp3');

    const islands = [
        { 
            id: 'default', 
            name: 'Classic Valley', 
            price: 0, 
            desc: 'The original 8-bit experience.', 
            image: 'assets/bg/1.png'
        },
        { 
            id: 'xmas_2025', 
            name: 'Xmas 2025', 
            price: 3500, 
            desc: 'Festive winter mission.', 
            image: 'assets/bg/xmas_2025.png'
        },
        { 
            id: 'chocolate-meteor', 
            name: 'Choco Meteor', 
            price: 5000, 
            desc: 'Floating cocoa anomalies.', 
            image: 'assets/bg/2.png'
        },
        { 
            id: 'frozen-valley', 
            name: 'Frozen Valley', 
            price: 8000, 
            desc: 'Sub-zero sugar terrain.', 
            image: 'assets/bg/frozen-valley.png'
        },
        { 
            id: 'fire-dungeon', 
            name: 'Fire Dungeon', 
            price: 16000, 
            desc: 'Maximum heat challenge.', 
            image: 'assets/bg/fire-dungeon.png'
        },
        { 
            id: 'bikini-bottom', 
            name: 'Bikini Bottom', 
            price: 19000, 
            desc: 'Deep sea candy hunt.', 
            image: 'assets/bg/bikini-bottom.jpg'
        }
    ];

    let gold = parseInt(localStorage.getItem('candySwap_gold')) || 0;
    let owned = JSON.parse(localStorage.getItem('candySwap_owned')) || ['default'];
    let active = localStorage.getItem('candySwap_activeIsland') || 'default';

    document.getElementById('gold-val').innerText = gold.toLocaleString();

    function showMessage(msg) {
        document.getElementById('msg-text').innerText = msg;
        document.getElementById('msg-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('msg-modal').style.display = 'none';
    }

    function render() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';

        islands.forEach((island, index) => {
            const isOwned = owned.includes(island.id);
            const isActive = active === island.id;
            const previousIslandOwned = index === 0 || owned.includes(islands[index - 1].id);
            const isLocked = !isOwned && !previousIslandOwned;

            const card = document.createElement('div');
            card.className = `island-card ${isActive ? 'active' : ''} ${isLocked ? 'locked' : ''}`;
            
            if (isLocked) {
                card.innerHTML = `
                    <div class="lock-overlay">
                        <div class="lock-text">LOCKED<br><br>UNLOCk PREVIOUS<br>STAGE FIRST</div>
                    </div>
                    <img src="${island.image}" class="island-preview" style="filter: blur(5px) grayscale(1);">
                    <div class="island-info">
                        <h2>??????</h2>
                        <p>Stage Encrypted</p>
                    </div>
                    <button class="buy-btn" disabled>LOCKED</button>
                `;
            } else {
                card.innerHTML = `
                    <img src="${island.image}" class="island-preview" alt="${island.name}" onerror="this.style.background='#222'">
                    <div class="island-info">
                        <h2>${island.name}</h2>
                        <p>${island.desc}</p>
                    </div>
                    ${isOwned 
                        ? (isActive ? '<div class="owned-badge blink">EQUIPPED</div>' : `<button class="buy-btn equip-btn" onclick="selectIsland('${island.id}')">USE STAGE</button>`)
                        : `<button class="buy-btn" onclick="buy('${island.id}', ${island.price})">BUY [${island.price} GP]</button>`
                    }
                `;
            }
            grid.appendChild(card);
        });
    }

    window.buy = (id, price) => {
        if (gold >= price) {
            gold -= price;
            owned.push(id);
            localStorage.setItem('candySwap_gold', gold);
            localStorage.setItem('candySwap_owned', JSON.stringify(owned));
            document.getElementById('gold-val').innerText = gold.toLocaleString();
            buySfx.currentTime = 0;
            buySfx.play().catch(() => {});
            selectIsland(id, false); 
        } else {
            showMessage("INSUFFICIENT GOLD PIECES!");
        }
    };

    window.selectIsland = (id, playSound = true) => {
        active = id;
        localStorage.setItem('candySwap_activeIsland', id);
        if(playSound) {
            equipSfx.currentTime = 0;
            equipSfx.play().catch(() => {});
        }
        render();
    };

    render();
</script>
</body>
</html>
